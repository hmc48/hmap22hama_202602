#jump-btn { top:195px; right:15px; background:#ff9800; color:white; }

#controls, #search-panel, #info-panel, #draw-panel {

  background:white; padding:15px; border-radius:8px; z-index:2000;

}
#controls { top:70px; }

#draw-panel { top:150px; }

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const colorMap = {"赤": "red", "青": "blue", "オレンジ": "orange", "緑": "green", "茶": "brown", "黄": "yellow"};
    const shapeMap = {"病院": "star", "診療所": "heart", "歯科": "club", "助産院": "square", "薬局": "spade"};

    const myRenderer = L.canvas({ padding: 0.5 });

    L.CustomMarker = L.CircleMarker.extend({
        _updatePath: function () {
            const ctx = this._renderer._ctx;
            const p = this._point;
            const r = this._radius;
            const s = this.options.shape;
            if (!this._renderer._drawing || this._empty()) return;
            ctx.fillStyle = this.options.fillColor;
            ctx.strokeStyle = this.options.color;
            ctx.lineWidth = this.options.weight;
            ctx.beginPath();
            if (s === 'star') {
                for(let i=0; i<5; i++) {
                    ctx.lineTo(p.x + r * Math.cos((18+i*72)/180*Math.PI), p.y - r * Math.sin((18+i*72)/180*Math.PI));
                    ctx.lineTo(p.x + (r/2.2) * Math.cos((54+i*72)/180*Math.PI), p.y - (r/2.2) * Math.sin((54+i*72)/180*Math.PI));
                }
            } else if (s === 'heart') {
                ctx.moveTo(p.x, p.y + r*0.8);
                ctx.bezierCurveTo(p.x-r*1.5, p.y-r*0.8, p.x-r*0.5, p.y-r*1.8, p.x, p.y-r*0.6);
                ctx.bezierCurveTo(p.x+r*0.5, p.y-r*1.8, p.x+r*1.5, p.y-r*0.8, p.x, p.y+r*0.8);
            } else if (s === 'club') {
                ctx.arc(p.x, p.y-r*0.5, r*0.5, 0, Math.PI*2);
                ctx.arc(p.x-r*0.5, p.y+r*0.2, r*0.5, 0, Math.PI*2);
                ctx.arc(p.x+r*0.5, p.y+r*0.2, r*0.5, 0, Math.PI*2);
                ctx.moveTo(p.x, p.y); ctx.lineTo(p.x-r*0.2, p.y+r*0.8); ctx.lineTo(p.x+r*0.2, p.y+r*0.8);
            } else if (s === 'square') {
                ctx.rect(p.x - r*0.7, p.y - r*0.7, r*1.4, r*1.4);
            } else if (s === 'spade') {
                ctx.moveTo(p.x, p.y-r);
                ctx.bezierCurveTo(p.x+r*1.4, p.y+r*0.4, p.x+r*0.4, p.y+r*1.2, p.x, p.y+r*0.4);
                ctx.bezierCurveTo(p.x-r*0.4, p.y+r*1.2, p.x-r*1.4, p.y+r*0.4, p.x, p.y-r);
                ctx.moveTo(p.x, p.y+r*0.2); ctx.lineTo(p.x-r*0.2, p.y+r*0.8); ctx.lineTo(p.x+r*0.2, p.y+r*0.8);
            } else {
                ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            }
            ctx.closePath(); ctx.fill(); ctx.stroke();
        }
    });

    const map = L.map('map', { 
        center: [34.710233985604596, 137.70251668848428], zoom: 15, preferCanvas: true, zoomControl: false 
    });

    function updateZoomIndicator() {
        document.getElementById('zoom-indicator').innerText = `Zoom: ${map.getZoom()}`;
    }
    updateZoomIndicator();
    map.on('zoomend', updateZoomIndicator);

    const baseLayers = {
      "標準": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 21, maxNativeZoom: 19 }),
      "国土地理院地図": L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', { maxZoom: 21, maxNativeZoom: 18 }),
      "航空写真": L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { maxZoom: 21, maxNativeZoom: 18 })
    };
    baseLayers["標準"].addTo(map);
    const creditText = { "標準": "© OpenStreetMap", "航空写真": "© 国土地理院（航空写真）", "国土地理院地図": "© 国土地理院" };

    const layerGroups = {};

    let currentTool = null;
    let currentColor = 'red';
    let drawLayerGroup = L.layerGroup().addTo(map);
    let tempPoints = [];
    let tempPolyline = null;

    function setTool(tool) {
        if (tool === null) {
            currentTool = null;
        } else {
            currentTool = (currentTool === tool) ? null : tool;
        }

        document.querySelectorAll('.draw-tool-btn').forEach(b => b.classList.remove('active-tool'));

        if(currentTool) {
            const btn = document.getElementById('tool-' + currentTool);
            if (btn) btn.classList.add('active-tool');
            map.doubleClickZoom.disable(); 
        } else {
            map.doubleClickZoom.enable();
        }

        document.getElementById('text-options').style.display = (currentTool === 'text') ? 'block' : 'none';
        document.getElementById('circle-options').style.display = (currentTool === 'circle') ? 'block' : 'none';
        resetTemp();
    }
    
    function resetTemp() {
        tempPoints = [];
        if(tempPolyline) { map.removeLayer(tempPolyline); tempPolyline = null; }
    }

    function addEraserEvent(layer) {
        layer.on('click', () => {
            if(currentTool === 'eraser') drawLayerGroup.removeLayer(layer);
        });
    }

    function clearDrawings() { if(confirm('全消去しますか？')) drawLayerGroup.clearLayers(); }

    function setDrawColor(color, el) {
        currentColor = color;
        document.querySelectorAll('.color-swatch').forEach(s => s.style.border = '1px solid #ccc');
        el.style.border = '3px solid #333';
    }

    map.on('click', (e) => {
        if(!currentTool || currentTool === 'eraser') return;
        let newLayer;
        if(currentTool === 'marker') {
            newLayer = L.marker(e.latlng).addTo(drawLayerGroup);
        } else if(currentTool === 'circle') {
            const r = document.getElementById('draw-radius').value;
            newLayer = L.circle(e.latlng, { radius: Number(r), color: currentColor, fillOpacity: 0.2 }).addTo(drawLayerGroup);
        } else if(currentTool === 'text') {
            const txt = document.getElementById('draw-text-input').value;
            const size = document.getElementById('draw-text-size').value;
            const font = document.getElementById('draw-text-font').value;
            const icon = L.divIcon({
                className: 'draw-txt',
                html: `<div style="color:${currentColor}; font-family:${font}; font-size:${size}px; font-weight:bold; white-space:nowrap; transform:translate(-50%, -50%); text-align:center; text-shadow:1px 1px 1px #fff;">${txt}</div>`,
                iconSize: [0, 0]
            });
            newLayer = L.marker(e.latlng, { icon: icon }).addTo(drawLayerGroup);
        } else if(currentTool === 'line' || currentTool === 'poly' || currentTool === 'rect') {
            tempPoints.push(e.latlng);
            if(currentTool === 'rect' && tempPoints.length === 2) {
                newLayer = L.rectangle(tempPoints, { color: currentColor, weight: 2 }).addTo(drawLayerGroup);
                tempPoints = [];
            } else {
                if(tempPolyline) map.removeLayer(tempPolyline);
                tempPolyline = L.polyline(tempPoints, {color: currentColor, dashArray: '5, 5', weight: 2}).addTo(map);
            }
        }
        if(newLayer) addEraserEvent(newLayer);
    });

    map.on('dblclick', (e) => {
        if (!currentTool) return;
        if (currentTool === 'line' || currentTool === 'poly') {
            tempPoints.pop();
            let finalLayer;
            if(currentTool === 'line' && tempPoints.length >= 2) {
                finalLayer = L.polyline(tempPoints, { color: currentColor, weight: 3 }).addTo(drawLayerGroup);
            } else if(currentTool === 'poly' && tempPoints.length >= 3) {
                finalLayer = L.polygon(tempPoints, { color: currentColor, fillOpacity: 0.2, weight: 2 }).addTo(drawLayerGroup);
            }
            if(finalLayer) addEraserEvent(finalLayer);
        }
        resetTemp();
    });

    // 住所/緯度経度ジャンプ
    let inputMarker = null;
    let lastJumpInput = "";
    function jumpToLocation() {
        const input = prompt("住所 施設名 または 緯度,経度 を入力してください。", lastJumpInput);
        if (!input) return;
        lastJumpInput = input;
        if (inputMarker) map.removeLayer(inputMarker);
        if (input.includes(",")) {
            const p = input.split(",");
            const lat = parseFloat(p[0]), lng = parseFloat(p[1]);
            if (!isNaN(lat) && !isNaN(lng)) {
                map.setView([lat, lng], 16);
                inputMarker = L.marker([lat, lng]).addTo(map).bindPopup(input).openPopup();
            }
        } else {
            fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=jp&q=${encodeURIComponent(input)}`)
            .then(res => res.json()).then(data => {
                if(data.length > 0) {
                    const lat = parseFloat(data[0].lat), lng = parseFloat(data[0].lon);
                    map.setView([lat, lng], 16);
                    inputMarker = L.marker([lat, lng]).addTo(map).bindPopup(data[0].display_name).openPopup();
                } else { alert("見つかりませんでした"); }
            });
        }
    }

    document.getElementById('search-input').oninput = function(e) {
        const val = e.target.value.toLowerCase().trim();
        const resDiv = document.getElementById('search-results');
        resDiv.innerHTML = ''; if(!val) return;
        const keywords = val.split(/[\s　]+/);
        for (let label in layerGroups) {
            if (label.includes("町丁目境界") || !layerGroups[label]) continue;
            layerGroups[label].eachLayer(l => {
                const name = (l.feature.properties["内容"] || "").toLowerCase();
                if(keywords.every(kw => name.includes(kw))) {
                    const item = document.createElement('div');
                    item.className = "search-item";
                    item.style = "padding:8px; border-bottom:1px solid #eee; font-size:13px;";
                    item.innerText = l.feature.properties["内容"];
                    item.onclick = () => {
                        document.getElementById('search-panel').style.display = 'none';
                        if (!map.hasLayer(l)) l.addTo(map);
                        map.panTo(l.getLatLng());
                        setTimeout(() => l.openPopup(), 250);
                    };
                    resDiv.appendChild(item);
                }
            });
        }
    };
    
    function togglePanel(id) {
        const p = document.getElementById(id);
        if (!p) return;
        const isVisible = p.style.display === 'block';

        // 他のパネル（検索など）を開く時だけ描画をリセット。描画パネルを閉じる時は維持する。
        if (!isVisible && id !== 'draw-panel') {
            setTool(null);
        }

        ['controls', 'search-panel', 'info-panel', 'draw-panel'].forEach(i => {
            const el = document.getElementById(i);
            if (el) el.style.display = 'none';
        });

        if (!isVisible) p.style.display = 'block';
    }

    document.getElementById('selectAllBtn').onclick = () => {

    document.querySelectorAll('input[name="baseLayer"]').forEach(radio => {

        for (let key in baseLayers) map.removeLayer(baseLayers[key]);
        baseLayers[this.value].addTo(map);
        document.getElementById("credit-title").innerText = creditText[this.value];
      });
